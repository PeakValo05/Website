<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="ContactPageCSS/body-content.css">
    <link rel="stylesheet" href="ContactPageCSS/cards.css">
    <link rel="stylesheet" href="ContactPageCSS/images.css">
    <link rel="stylesheet" href="ContactPageCSS/buttons.css">
    <link rel="stylesheet" href="ContactPageCSS/bars.css">
    <link rel="stylesheet" href="ContactPageCSS/cards-responsive.css">
    <link rel="stylesheet" href="ContactPageCSS/buttons-responsive.css">
    <link rel="stylesheet" href="ContactPageCSS/mobile-btn-responsive.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
</head>

<body>


        <!--Container to hold logo and name-->
    <div class="logo-name-container">
        <img src="images/PV logo.png" class="PV-logo">
        <h1 class="peaks-label">PEAKSVALO</h1>



            <!-- ==== Container for all nav button ==== -->
    <div class="nav-button-container">
        <a href="index.html" class="home-btn">Home</a>
        <a href="about-page.html" class="about-btn">About</a>
        <a href="contact-page.html" class="contact-btn">Contact</a>
        <a href="connect.html" class="connect-btn">Connect</a>
        <button class="download-resume-btn">Download Resume</button>
    </div>


    <!-- ==== END of the CONTAINER that started at "logo-name-container" ==== -->
    </div>



    <!-- Main Contact Section -->
    <div class="card-content">

        <div class="contact-card">

            <!-- Header -->
            <h1 class="header" style="font-family: 'Poppins', sans-serif;">
                Let's <span class="connect-header">Connect</span>

                <p class="sub-tag" style="font-weight: 200">
                    Feel free to reach out or check out my work.
                </p>
            </h1>

            <!-- Email Card -->
            <a href="mailto:jwiser.dev@gmail.com"
               target="_blank"
               class="card-one">

                <div class="circle">
                    <img src="images/message.png" class="email-img">
                </div>

                <div class="text-wrap">
                    <p class="linkedin-tag" style="padding-left: 10px; font-weight: bold; font-family: 'Poppins', sans-serif;">
                        Email
                    </p>

                    <p style="padding-left: 10px;">
                        Email Me
                    </p>
                </div>

            </a>

            <!-- Phone Card -->
            <a href="tel:4258797310"
               target="_blank"
               class="card-one">

                <div class="circle-two">
                    <img src="images/call.png" class="phone-img">
                </div>

                <div class="text-wrap">
                    <p class="linkedin-tag" style="padding-left: 10px; font-weight: bold; font-family: 'Poppins', sans-serif;">
                        Phone
                    </p>

                    <p style="padding-left: 10px;">
                        Contact Me
                    </p>
                </div>

            </a>

            <!-- GitHub Card -->
            <a href="https://github.com/PeakValo05"
               target="_blank"
               class="card-one">

                <div class="circle-three">
                    <img src="images/github.png" class="linkedin-img">
                </div>

                <div class="text-wrap">
                    <p class="linkedin-tag" style="padding-left: 10px; font-weight: bold; font-family: 'Poppins', sans-serif;">
                        GitHub
                    </p>

                    <p style="padding-left: 10px;">
                        View Profile
                    </p>
                </div>

            </a>

            <!-- LinkedIn Card -->
            <a href="https://www.linkedin.com/in/jackson-wiser-9a13a2256/"
               target="_blank"
               class="card-one">

                <div class="circle-four">
                    <img src="images/linkedin.png" class="linkedin-img">
                </div>

                <div class="text-wrap">
                    <p class="linkedin-tag" style="padding-left: 10px; font-weight: bold; font-family: 'Poppins', sans-serif;">
                        LinkedIn
                    </p>

                    <p style="padding-left: 10px;">
                        View Profile
                    </p>
                </div>

            </a>

            <!-- Closing Message -->
            <p style="color: white; font-family: 'Dancing Script', cursive; font-size: 20px;">
                Looking forward to hearing from you
            </p>

        </div>

    </div>

    <!-- Footer -->

        <p class="notice-label" style="color: white">
            © 2026 Jackson Wiser. All Rights Reserved.
        </p>
    </div>

    <!-- Hamburger Menu Script -->
    <script>
        const burger = document.getElementById("burger");
        const mobileMenu = document.querySelector(".mobile-menu");

        burger.addEventListener("change", () => {
            mobileMenu.classList.toggle("active");
        });
    </script>

</body>

</html>
